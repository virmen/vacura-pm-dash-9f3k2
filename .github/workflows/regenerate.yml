name: Regenerate PM Dashboards

on:
  schedule:
    # 04:00 UTC = 06:00 Berlin (Sommer/CEST) bzw. 05:00 Berlin (Winter/CET)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: generator/requirements.txt

      - name: Install dependencies
        run: pip install -r generator/requirements.txt

      - name: Generate dashboards
        env:
          NOCODB_TOKEN: ${{ secrets.NOCODB_TOKEN }}
          EXCEL_PATH: ${{ github.workspace }}/generator/PM_Gehaltsmodell_v18.xlsx
          OUT_DIR: ${{ github.workspace }}
        run: python3 generator/generate.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.html'
          if git diff --cached --quiet; then
            echo "No HTML changes — skipping commit."
            exit 0
          fi
          git commit -m "Auto-update PM dashboards ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push
