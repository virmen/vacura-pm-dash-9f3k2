name: Tarif-Watch

on:
  schedule:
    # Täglich 05:00 UTC (= 06:00 Berlin Winter, 07:00 Berlin Sommer),
    # eine Stunde nach dem regenerate.yml Daily-Run. Lookback 7 Tage, daher
    # auch bei Workflow-Ausfall wird die Änderung im Folge-Lauf erkannt.
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: generator/requirements.txt

      - name: Install dependencies
        run: pip install -r generator/requirements.txt

      - name: Tarif-Check ausführen
        id: check
        env:
          NOCODB_TOKEN: ${{ secrets.NOCODB_TOKEN }}
          EXCEL_PATH: ${{ github.workspace }}/generator/PM_Gehaltsmodell.xlsx
        run: |
          # Generator gibt eine Info-Zeile auf stdout aus, danach JSON.
          # Wir extrahieren ab erster '{' Zeile, damit der Parser nur valid JSON sieht.
          python3 generator/generate.py --check-tarife > /tmp/tarif_raw.txt
          echo "--- Raw output ---"
          cat /tmp/tarif_raw.txt
          sed -n '/^[{[]/,$p' /tmp/tarif_raw.txt > /tmp/tarif_check.json
          echo "--- JSON only ---"
          cat /tmp/tarif_check.json
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/tarif_check.json'))['status'])")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: GitHub-Issue bei Tarif-Änderung erstellen
        if: steps.check.outputs.status == 'change_detected'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/tarif_check.json', 'utf8'));
            const changes_md = data.changes.map(c =>
              `- **\`${c.schluessel}\`**: ${c.alt_wert.toFixed(2)} € → ${c.neu_wert.toFixed(2)} € (${c.delta_pct >= 0 ? '+' : ''}${c.delta_pct} %, gültig ab ${c.gueltig_ab})`
            ).join('\n');
            const schwellen_md = data.empfohlen_schwellen.map(s =>
              `| ${s.n} | ${s.name} | ${s.alt_eur60.toFixed(2)} | ${s.neu_eur60.toFixed(2)} |`
            ).join('\n');
            const scale = data.scale_factor;
            const scale_pct = ((scale - 1) * 100).toFixed(2);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `💶 Tarif-Änderung erkannt — Schwellen anpassen?`,
              body: `Neue Vergütungssätze in NocoDB \`verguetungssaetze\` aktiv (Detection-Fenster: 7 Tage):

            ${changes_md}

            **Gewichteter Skalierungsfaktor: ${scale}** (${scale_pct >= 0 ? '+' : ''}${scale_pct} % Bundle-Umsatz, basierend auf Vacura-Standard-Termin-Mix).

            | Stufe | Name | aktuell €/h | empfohlen €/h |
            |---|---|---|---|
            ${schwellen_md}

            ---

            **Entscheidung Geschäftsführung — eine von zwei Optionen:**

            **A) Schwellen mit-skalieren** → Excel \`PM_Gehaltsmodell.xlsx\` Tab \`Stufentabelle\` öffnen, neue €/h-Werte in Spalte \`eur60\` eintragen, speichern + ins Deploy-Repo synchen. PMs profitieren NICHT direkt vom Tarif-Wechsel, müssen weiter Leistung bringen für die nächste Stufe. Issue mit "A — übernommen" schließen.

            **B) Schwellen stehen lassen** → Tarif-Erhöhung als Goodie an PMs durchreichen. PMs rutschen mit dem nächsten Q-End-Run automatisch in höhere Stufen, da ihr €/h-IST steigt während Schwellen gleich bleiben. Issue mit "B — bewusst stehen gelassen" schließen.

            ---

            **Annahmen für Skalierung** (siehe \`generate.py\` Konstanten \`DEFAULT_TERMIN_MIX\` + \`DEFAULT_HB_ANTEIL\`):
            - Mix: ${JSON.stringify(data.mix_used)}
            - HB-Anteil: ${data.hb_anteil}

            Bei größeren Mix-Verschiebungen oder selektiven Tarif-Änderungen können die Konstanten neu kalibriert werden — Methodik in \`code/METHODE.md\`.`,
            });

      - name: Bei no_change nur Status loggen
        if: steps.check.outputs.status != 'change_detected'
        run: echo "Keine Tarif-Änderung in den letzten 7 Tagen — kein Issue erstellt."
