name: Q-End Sanity-Reminder

on:
  schedule:
    # 1. Tag des Folge-Monats nach Q-Ende (1. Jan / Apr / Jul / Okt) um 07:00 UTC = 09:00 Berlin
    # Erinnerung an Geschäftsführung 1 Woche VOR der Q-End-Routine,
    # damit Zufriedenheits-Werte + MediFox-Werte rechtzeitig ins Excel eingetragen werden.
    - cron: '0 7 1 1,4,7,10 *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub-Issue als Reminder erstellen
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date();
            const m = today.getMonth() + 1;     // 1-12
            const y = today.getFullYear();
            const q_now = Math.ceil(m / 3);     // 1-4
            // Welches Q wird in 7 Tagen automatisch bewertet? = letztes abgeschlossenes Q
            const qLabel = q_now === 1 ? `${y - 1}-Q4` : `${y}-Q${q_now - 1}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⏰ Q-End-Routine ${qLabel} läuft in 7 Tagen — Excel vorbereiten`,
              body: `Die automatische Q-End-Bewertung für **${qLabel}** läuft am **8. dieses Monats** um 03:00 UTC.

              Bitte vorher im Excel \`PM_Gehaltsmodell.xlsx\` im Tab **Quartals-Bewertungen** eintragen:

              **Pro PM (Laura/Marleen/Luise/Max) eine Zeile, 4 gelbe Spalten ausfüllen:**

              - **Rücken-Score** (0-10) aus Q-Umfrage
              - **Komm-Score** (0-10) aus Q-Umfrage
              - **eNPS-Score** (0-10) aus Q-Umfrage
              - **MediFox-IST €** — Bundle-Umsatz aus MediFox-Export für das Quartal

              Werte aus der Quartals-Umfrage (anonym, ≥60 % Teilnahme) + MediFox-Export.
              **Ohne diese Werte fällt die Stufen-Bewertung falsch aus** (Zufriedenheit-Schwelle nicht prüfbar).

              **Bei Personal-Wechsel:** Tab \`PM-Stammdaten\` aktualisieren.

              **Wenn nichts geändert wird:** die Routine läuft trotzdem mit den vorhandenen Werten —
              Status-Spalte zeigt dann an, was fehlt.

              Vollständige Anleitung: \`ANLEITUNG_QUARTALSWECHSEL.md\` im Repo-Root.
              Berechnungs-Methodik: \`METHODE.md\``
            });
